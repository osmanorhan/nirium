# ── Nirium Fuzzel Config — Monokai ───────────────────────────────────────────
# Docs: https://man.archlinux.org/man/fuzzel.ini.5

[main]
font=JetBrainsMono Nerd Font:size=13
prompt=›  
terminal=kitty
layer=overlay
exit-on-keyboard-focus-loss=yes
lines=12
width=40
horizontal-pad=16
vertical-pad=8
inner-pad=4
image-size-ratio=0.5

[colors]
# Monokai palette
background=272822ff
text=f8f8f2ff
match=66d9efff
selection=3e3d32ff
selection-text=f8f8f2ff
selection-match=66d9efff
border=75715eff
prompt=fd971fff

[border]
width=1
radius=6

[dmenu]
# cliphist uses dmenu mode — use Mod+V to open clipboard history
mode=text
